name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - main
      - qa
      - lab

env:
  REGION: 'us-central1'
  BILLING_PROJECT_ID: 'system8-ai-admin'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/825858166085/locations/global/workloadIdentityPools/github-pool/providers/github-provider'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332'

      - name: Set environment variables
        run: |
          case "${{ github.ref_name }}" in
            main)    ENVIRONMENT="prod" ;;
            qa)      ENVIRONMENT="qa" ;;
            lab) ENVIRONMENT="lab" ;;
            *)       echo "Unknown branch: ${{ github.ref_name }}" && exit 1 ;;
          esac
          echo "ENVIRONMENT=$ENVIRONMENT"                             >> $GITHUB_ENV
          echo "PROJECT_ID=elysium-$ENVIRONMENT"                     >> $GITHUB_ENV
          echo "SERVICE=${ENVIRONMENT}-quantpacom                          >> $GITHUB_ENV
          echo "REPO=us-docker.pkg.dev/elysium-$ENVIRONMENT/system8" >> $GITHUB_ENV

      - name: 'Aut/henticate to Google Cloud'
        id: 'auth'
        uses: 'google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: 'Docker Auth'
        uses: 'docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: 'us-docker.pkg.dev'

      - name: 'Build and Push Container'
        run: |-
          DOCKER_TAG="${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build --tag "${DOCKER_TAG}" --platform linux/amd64 frontend/
          docker push "${DOCKER_TAG}"
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV

      - name: 'Deploy to Cloud Run'
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@33553064113a37d688aa6937bacbdc481580be17'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          image: '${{ env.DOCKER_TAG }}'
          project_id: '${{ env.PROJECT_ID }}'
          flags: >-
            --service-account=elysium-data-pusher-${{ env.ENVIRONMENT }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
            --port=80

      - name: 'Show output'
        run: echo ${{ steps.deploy.outputs.url }}
